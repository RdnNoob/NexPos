name: Build NexPos APKs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Buat local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Install SDK Components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" > /dev/null 2>&1

      - name: Beri izin Gradle
        run: chmod +x ./gradlew

      - name: Build Admin APK Debug
        run: ./gradlew :app-admin:assembleDebug --no-daemon --stacktrace

      - name: Build Laundry APK Debug
        run: ./gradlew :app-laundry:assembleDebug --no-daemon --stacktrace

      - name: Upload Admin APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: NexPos-Admin-Debug
          path: app-admin/build/outputs/apk/debug/app-admin-debug.apk
          retention-days: 14

      - name: Upload Laundry APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: NexPos-Laundry-Debug
          path: app-laundry/build/outputs/apk/debug/app-laundry-debug.apk
          retention-days: 14

  build-release:
    name: Build Release APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Buat local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install SDK Components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" > /dev/null 2>&1

      - name: Beri izin Gradle
        run: chmod +x ./gradlew

      - name: Build Admin APK Release
        run: ./gradlew :app-admin:assembleRelease --no-daemon --stacktrace

      - name: Build Laundry APK Release
        run: ./gradlew :app-laundry:assembleRelease --no-daemon --stacktrace

      - name: Upload Admin APK Release
        uses: actions/upload-artifact@v4
        with:
          name: NexPos-Admin-Release
          path: app-admin/build/outputs/apk/release/app-admin-release-unsigned.apk
          retention-days: 30

      - name: Upload Laundry APK Release
        uses: actions/upload-artifact@v4
        with:
          name: NexPos-Laundry-Release
          path: app-laundry/build/outputs/apk/release/app-laundry-release-unsigned.apk
          retention-days: 30
